spring.application.name=supplyNest-api-gateway

server.port = 9093
eureka.client.service-url.defaultZone=http://localhost:8090/eureka/

spring.cloud.gateway.routes[0].id=supplyNest-auth-service
spring.cloud.gateway.routes[0].uri=lb://SUPPLYNEST-AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/supplyNest/auth/**, /supplyNest/role/**, /test/**
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs

