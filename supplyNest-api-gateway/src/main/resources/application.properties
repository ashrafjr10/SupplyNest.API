spring.application.name=supplyNest-api-gateway

server.port = 9093
eureka.client.service-url.defaultZone=http://localhost:8090/eureka/
eureka.instance.prefer-ip-address=true

#OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# --- API Gateway routes (Spring Cloud Gateway Reactive) ---
# Auth service API traffic
spring.cloud.gateway.server.webflux.routes[0].id=supplyNest-auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://SUPPLYNEST-AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**,/role/**,/test/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/auth/(?<segment>.*), /${segment}

# Auth service OpenAPI definition (consumed by the aggregated Swagger UI)
spring.cloud.gateway.server.webflux.routes[1].id=auth-service-api-docs
spring.cloud.gateway.server.webflux.routes[1].uri=lb://SUPPLYNEST-AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/auth-service/(?<segment>.*), /${segment}

spring.cloud.gateway.server.webflux.routes[2].id=supplyNest-business-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://SUPPLYNEST-BUSINESS-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/business-group/**,/uploads/**,/test/**

spring.cloud.gateway.server.webflux.routes[3].id=business-service-api-docs
spring.cloud.gateway.server.webflux.routes[3].uri=lb://SUPPLYNEST-BUSINESS-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/business-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/business-service/(?<segment>.*), /${segment}

# --- Aggregated Swagger UI served at the gateway (/swagger-ui/index.html) ---
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=Business Service
springdoc.swagger-ui.urls[1].url=/business-service/v3/api-docs
