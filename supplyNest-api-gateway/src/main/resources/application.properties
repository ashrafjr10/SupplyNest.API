spring.cloud.gateway.routes[10].id=auth-swagger
spring.cloud.gateway.routes[10].uri=lb://SUPPLYNEST-AUTH-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/auth-service/(?<segment>.*), /${segment}