spring.application.name=supplyNest-api-gateway

server.port = 9093
eureka.client.service-url.defaultZone=http://localhost:8090/eureka/

# --- API Gateway routes (Spring Cloud Gateway Server WebMVC) ---
# Auth service API traffic
spring.cloud.gateway.server.webmvc.routes[0].id=supplyNest-auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://SUPPLYNEST-AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/supplyNest/auth/**,/supplyNest/role/**,/test/**

# Auth service OpenAPI definition (consumed by the aggregated Swagger UI)
spring.cloud.gateway.server.webmvc.routes[1].id=auth-service-api-docs
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://SUPPLYNEST-AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=RewritePath=/auth-service/(?<segment>.*), /${segment}

# --- Aggregated Swagger UI served at the gateway (/swagger-ui/index.html) ---
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs
